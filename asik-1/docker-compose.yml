services:
  orders-db:
    image: postgres:16
    container_name: orders-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - "5433:5432"
    volumes:
      - orders_data:/var/lib/postgresql/data
      - ./order-service/migrations:/docker-entrypoint-initdb.d

  payments-db:
    image: postgres:16
    container_name: payments-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments_db
    ports:
      - "5434:5432"
    volumes:
      - payments_data:/var/lib/postgresql/data
      - ./payment-service/migrations:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    depends_on:
      - payments-db
      - rabbitmq
    environment:
      GRPC_PORT: 50051
      DATABASE_URL: postgres://postgres:postgres@payments-db:5432/payments_db?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "50051:50051"

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    depends_on:
      - orders-db
      - payment-service
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@orders-db:5432/orders_db?sslmode=disable
      PAYMENT_GRPC_ADDR: payment-service:50051
      PAYMENT_CALL_TIMEOUT: 5s
    ports:
      - "8080:8080"

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PAYMENT_COMPLETED_QUEUE: payment.completed

volumes:
  orders_data:
  payments_data: